<!DOCTYPE html>
<html>
<head>
  <title>System Breach</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: monospace;
      overflow: hidden;
    }

    #intro {
      position: absolute;
      width: 100%;
      top: 40%;
      text-align: center;
      font-size: 35px;
      color: white;
      cursor: pointer;
      animation: glitch 1s infinite;
    }

    #terminal {
      display: none;
      padding: 20px;
      height: 100vh;
      white-space: pre-line;
    }

    #alert {
      position: absolute;
      top: 30%;
      width: 100%;
      text-align: center;
      font-size: 32px;
      color: red;
      display: none;
    }

    #final {
      position: absolute;
      top: 40%;
      width: 100%;
      text-align: center;
      font-size: 38px;
      color: red;
      display: none;
      animation: glitch 0.5s infinite;
    }

    @keyframes glitch {
      0% {transform: translate(0);}
      25% {transform: translate(-2px,2px);}
      50% {transform: translate(2px,-2px);}
      75% {transform: translate(-2px,0);}
      100% {transform: translate(0);}
    }

    .redFlash {
      background: red !important;
      color: black !important;
    }
  </style>
</head>
<body>

<div id="intro" onclick="startAll()">
⚡ TAP TO UNLOCK SYSTEM ⚡
</div>

<div id="terminal"></div>

<div id="alert">
⚠ SYSTEM BREACH DETECTED ⚠<br>
⚠ SECURITY FAILURE ⚠
</div>

<div id="final">
💀 HACKED BY MR. SR MOHANTY 💀
</div>

<audio id="sound" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>
let terminal = document.getElementById("terminal");
let alertBox = document.getElementById("alert");
let final = document.getElementById("final");
let sound = document.getElementById("sound");

// 👉 MAIN START FUNCTION (tap ke baad)
function startAll() {

  document.getElementById("intro").style.display = "none";
  terminal.style.display = "block";

  // Step 1: Surprise text (2 lines)
  terminal.innerHTML += "Initializing system...\n";
  setTimeout(() => {
    terminal.innerHTML += "Access granted...\n";
  }, 800);

  // Step 2: Start coding after delay
  setTimeout(startHack, 2000);

}

// 👉 Hacker coding
function startHack() {

  // Code rain
  setInterval(() => {
    let chars = "01#$%^&*";
    let random = "";
    for (let i = 0; i < 60; i++) {
      random += chars[Math.floor(Math.random()*chars.length)];
    }
    terminal.innerHTML += random + "\n";
    terminal.scrollTop = terminal.scrollHeight;
  }, 100);

  // Shock moment
  setTimeout(() => {
    alertBox.style.display = "block";
    document.body.classList.add("redFlash");

    // vibration
    if (navigator.vibrate) {
      navigator.vibrate([400,200,400]);
    }

    // sound
    sound.play().catch(()=>{});

  }, 3000);

  // Final text
  setTimeout(() => {
    alertBox.style.display = "none";
    document.body.classList.remove("redFlash");
    final.style.display = "block";
  }, 6000);
}
</script>

</body>
</html>
